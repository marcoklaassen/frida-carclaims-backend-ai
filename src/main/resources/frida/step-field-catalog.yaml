# Maps frontend stepKey (sessionStorage) to allowed flat field names for voice extraction.
# All fields are now flat (no nested paths). Prefixes match the start of field names.
steps:
  carclaimsDetails:
    hints: |
      - The user is on the accident details tab.
      - "Ort", "Straße", "PLZ" on this page mean accidentCity, accidentStreetName, accidentPostalCode.
      - Map spoken German dates to YYYY-MM-DD and times to HH:mm:ss.
    allowedPathPrefixes:
      - language
      - accident

  insurance-holder-a:
    hints: |
      - The user is on THEIR OWN personal info and vehicle tab (Versicherungsnehmer A).
      - ALL spoken personal data (name, address, phone, email) goes to insuranceHolder* fields.
      - ALL spoken vehicle/insurance data goes to carBrand, carModel, licensePlate, insuranceCompany, insuranceNumber, etc.
      - Do NOT use otherInsuranceHolder* or otherDriver* fields here.
    allowedPathPrefixes:
      - insuranceHolder
      - vatDeduction
      - carBrand
      - carModel
      - licensePlate
      - insuranceCompany
      - insuranceNumber
      - chassisNumber
      - odometerReading
      - greenCardNumber
      - validDateGreenCard
      - allRiskInsurance

  driver-a:
    hints: |
      - The user is on THEIR OWN driver and damage tab (Fahrer A).
      - ALL spoken driver personal data goes to driver* fields (driverName, driverSurName, etc.).
      - ALL spoken damage info goes to damageType, driverDamagedParts, damageDescription, etc.
      - If the speaker says they drove themselves, also fill driver* personal fields.
      - Do NOT use otherDriver* fields here.
    allowedPathPrefixes:
      - driver
      - damageDescription
      - additionalComments
      - vehicleOperational
      - damageType

  injuredDetails:
    hints: |
      - The user is on the injured persons tab.
      - hasInjured (tri-state) and injuredCount (count as string).
    allowedPathPrefixes:
      - hasInjured
      - injuredCount

  miscellaneousDamages:
    hints: |
      - The user is on the other property damage tab.
      - miscellaneousDamages (tri-state) and miscellaneousDamageDescription.
    allowedPathPrefixes:
      - miscellaneousDamages
      - miscellaneousDamageDescription

  insurance-holder-b:
    hints: |
      - The user is on the OTHER PARTY's personal info and vehicle tab (Unfallbeteiligte:r B / Versicherungsnehmer B).
      - ALL spoken personal data (name, address, phone, email) goes to otherInsuranceHolder* fields.
      - ALL spoken vehicle/insurance data goes to otherCarBrand, otherCarModel, otherLicensePlate, otherInsuranceCompany, otherInsuranceNumber, etc.
      - Do NOT use insuranceHolder* or driver* fields here — everything on this tab is about the other party.
    allowedPathPrefixes:
      - otherInsuranceHolder
      - otherVatDeduction
      - otherCarBrand
      - otherCarModel
      - otherLicensePlate
      - otherInsuranceCompany
      - otherInsuranceNumber
      - otherChassisNumber
      - otherOdometerReading
      - otherGreenCardNumber
      - otherValidDateGreenCard
      - otherAllRiskInsurance

  driver-b:
    hints: |
      - The user is on the OTHER PARTY's driver and damage tab (Fahrer B / Unfallgegner).
      - ALL spoken driver personal data goes to otherDriver* fields (otherDriverName, otherDriverSurName, etc.).
      - ALL spoken damage info goes to otherDamageType, otherDriverDamagedParts, otherDamageDescription, etc.
      - Do NOT use driver* or insuranceHolder* fields here — everything on this tab is about the other party.
    allowedPathPrefixes:
      - otherDriver
      - otherDamageDescription
      - otherAdditionalComments
      - otherVehicleOperational
      - otherDamageType

  witness:
    hints: |
      - The user is on the witnesses tab.
      - Zeugen: hasWitnesses, witnessesCount, witnesses[] with flat fields per witness (salutation, name, surName, etc.).
    allowedPathPrefixes:
      - hasWitnesses
      - witnessesCount
      - witnesses
