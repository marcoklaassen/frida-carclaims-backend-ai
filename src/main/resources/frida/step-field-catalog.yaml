# Maps frontend stepKey (sessionStorage) to allowed flat field names for voice extraction.
# All fields are now flat (no nested paths). Prefixes match the start of field names.
steps:
  carclaimsDetails:
    hints: |
      - This step captures the accident (Unfall), not the policyholder home address.
      - "Ort", "Straße", "PLZ" on this page mean accidentCity, accidentStreetName, accidentPostalCode.
      - Map spoken German dates to YYYY-MM-DD and times to HH:mm:ss.
    allowedPathPrefixes:
      - language
      - accident

  insurance-holder-a:
    hints: |
      - Versicherungsnehmer A: insurance holder and own vehicle/insurance data.
      - Home address phrases ("Ich wohne in …") map to insuranceHolder* fields.
    allowedPathPrefixes:
      - insuranceHolder
      - vatDeduction
      - carBrand
      - carModel
      - licensePlate
      - insuranceCompany
      - insuranceNumber
      - chassisNumber
      - odometerReading
      - greenCardNumber
      - validDateGreenCard
      - allRiskInsurance

  driver-a:
    hints: |
      - Fahrer A (own driver): driver* fields including damage cause and damaged parts.
      - If the speaker says they drove, also fill driver* personal fields.
    allowedPathPrefixes:
      - driver
      - damageDescription
      - additionalComments
      - vehicleOperational
      - damageType

  injuredDetails:
    hints: |
      - Verletzte Personen: hasInjured (tri-state) and injuredCount (count as string).
    allowedPathPrefixes:
      - hasInjured
      - injuredCount

  miscellaneousDamages:
    hints: |
      - Weitere Sachschäden: miscellaneousDamages (tri-state) and miscellaneousDamageDescription.
    allowedPathPrefixes:
      - miscellaneousDamages
      - miscellaneousDamageDescription

  insurance-holder-b:
    hints: |
      - Only populate when the transcript explicitly mentions the other party (Unfallgegner B).
      - Versicherungsnehmer B → otherInsuranceHolder* fields and other* vehicle/insurance fields.
    allowedPathPrefixes:
      - otherInsuranceHolder
      - otherVatDeduction
      - otherCarBrand
      - otherCarModel
      - otherLicensePlate
      - otherInsuranceCompany
      - otherInsuranceNumber
      - otherChassisNumber
      - otherOdometerReading
      - otherGreenCardNumber
      - otherValidDateGreenCard
      - otherAllRiskInsurance

  driver-b:
    hints: |
      - Only populate when the transcript explicitly mentions the other driver (Fahrer B).
      - Fahrer B → otherDriver* fields and other* damage fields.
    allowedPathPrefixes:
      - otherDriver
      - otherDamageDescription
      - otherAdditionalComments
      - otherVehicleOperational
      - otherDamageType

  witness:
    hints: |
      - Zeugen: hasWitnesses, witnessesCount, witnesses[] with flat fields per witness (salutation, name, surName, etc.).
    allowedPathPrefixes:
      - hasWitnesses
      - witnessesCount
      - witnesses
