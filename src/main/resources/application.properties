# Chat — claims extraction (Qwen3.6-35B-A3B)
quarkus.langchain4j.openai.base-url=${CHAT_BASE_URL:https://litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com/v1/}
quarkus.langchain4j.openai.api-key=${CHAT_API_KEY:}
quarkus.langchain4j.openai.chat-model.model-name=${CHAT_MODEL:Qwen3.6-35B-A3B}
quarkus.langchain4j.openai.timeout=${CHAT_TIMEOUT:120s}
quarkus.langchain4j.response-schema=false

# Audio transcription — OpenAI-compatible API
voice.transcription.base-url=${TRANSCRIPTION_BASE_URL:https://api.openai.com/v1/}
voice.transcription.api-key=${TRANSCRIPTION_API_KEY:}
voice.transcription.model=${TRANSCRIPTION_MODEL:whisper-1}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/

# Bundled into GraalVM native image (classpath resources are excluded by default)
quarkus.native.resources.includes=frida/claimsOas.yaml,frida/descriptionClaim.md,frida/voice-mapping-hints.md,frida/step-field-catalog.yaml,frida/german-field-synonyms.md,frida/voice-extraction-examples.md
quarkus.native.additional-build-args=-march=compatibility

%dev.quarkus.langchain4j.openai.chat-model.log-requests=true
%dev.quarkus.langchain4j.openai.chat-model.log-responses=true

# Production logging (override via env, e.g. QUARKUS_LOG_CATEGORY__CLICK_KLAASSEN__LEVEL=DEBUG)
%prod.quarkus.log.level=INFO
%prod.quarkus.log.category."click.klaassen".level=INFO
%prod.quarkus.http.access-log.enabled=true
%prod.quarkus.langchain4j.openai.chat-model.log-requests=true
%prod.quarkus.langchain4j.openai.chat-model.log-responses=true
