# LiteLLM — claims extraction (Qwen3.6-35B-A3B)
quarkus.langchain4j.openai.base-url=${LITELLM_BASE_URL:https://litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com/v1/}
quarkus.langchain4j.openai.api-key=${LITELLM_API_KEY:}
quarkus.langchain4j.openai.chat-model.model-name=${CHAT_MODEL:Qwen3.6-35B-A3B}
quarkus.langchain4j.openai.timeout=${LITELLM_TIMEOUT:120s}
quarkus.langchain4j.response-schema=false

# whisper.cpp server — full /inference URL (not OpenAI /v1/audio/transcriptions)
voice.transcription.base-url=${WHISPER_BASE_URL:}
voice.transcription.api-key=${WHISPER_API_KEY:}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/

%dev.quarkus.langchain4j.openai.chat-model.log-requests=true
%dev.quarkus.langchain4j.openai.chat-model.log-responses=true
