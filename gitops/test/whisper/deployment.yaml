apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: frida-carclaims-test
  labels:
    app: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      initContainers:
        - name: download-model
          image: curlimages/curl:8.12.1
          command:
            - sh
            - -c
            - |
              set -e
              MODEL=/models/ggml-small.bin
              if [ -s "$MODEL" ]; then
                echo "Model already present: $(wc -c < "$MODEL") bytes"
                exit 0
              fi
              echo "Downloading ggml-small.bin from Hugging Face..."
              curl -fL --retry 3 --retry-delay 5 -o "$MODEL" \
                https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
              echo "Downloaded: $(wc -c < "$MODEL") bytes"
          volumeMounts:
            - name: whisper-model
              mountPath: /models
      containers:
        - name: whisper
          image: quay.io/ramalama/ramalama-whisper-server@sha256:377f9a91ba0030548bca8a3845be1c8396bd2255a0aae01e1be43845b1ee5f1e
          workingDir: /tmp/whisper
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /models/ggml-small.bin
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: TMPDIR
              value: /tmp/whisper
          volumeMounts:
            - name: whisper-model
              mountPath: /models
              readOnly: true
            - name: whisper-tmp
              mountPath: /tmp/whisper
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: whisper-model
          persistentVolumeClaim:
            claimName: whisper-model
        - name: whisper-tmp
          emptyDir: {}
